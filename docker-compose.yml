services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: aih
      POSTGRES_USER: aih
      POSTGRES_PASSWORD: aih
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aih -d aih"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://aih:aih@postgres:5432/aih?schema=public
      REDIS_URL: redis://redis:6379
      API_PORT: 4000
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:-}
      COOKIE_NAME: ${COOKIE_NAME:-aih_session}
      AI_PROVIDER: ${AI_PROVIDER:-openai-compatible}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MOCK_MODE: ${AI_MOCK_MODE:-true}
      AI_DEFAULT_MODEL: ${AI_DEFAULT_MODEL:-gpt-5.4-mini}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "4000:4000"
    command: ["sh", "-c", "npm run prisma:deploy && npm --workspace @aih/api run start"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["npm", "--workspace", "@aih/api", "run", "start:worker"]
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://aih:aih@postgres:5432/aih?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-}
      AI_PROVIDER: ${AI_PROVIDER:-openai-compatible}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MOCK_MODE: ${AI_MOCK_MODE:-true}
      AI_DEFAULT_MODEL: ${AI_DEFAULT_MODEL:-gpt-5.4-mini}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_HEALTH_FILE: /tmp/aih-worker-health.json
    healthcheck:
      test: ["CMD", "npm", "--workspace", "@aih/api", "run", "health:worker"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      WEB_PUBLIC_API_BASE_URL: ${WEB_PUBLIC_API_BASE_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://' + process.env.HOSTNAME + ':3000/login').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
